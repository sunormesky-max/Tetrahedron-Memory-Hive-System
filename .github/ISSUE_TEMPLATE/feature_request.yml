name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your idea! Please describe the feature you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Why do you need it?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you imagine this working?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Core (GeoMemoryBody)
        - Geometry (TetraMesh, Alpha Complex)
        - Dream Cycle
        - Zigzag Persistence / Mapping Cone
        - Resolution Pyramid
        - Eternity Audit
        - Persistence (Parquet/S3)
        - REST API
        - LLM Tools
        - Distributed (Ray)
        - Visualization
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information, references, or links
