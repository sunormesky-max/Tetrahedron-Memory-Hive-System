name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal Reproducible Example
      description: Paste the smallest code snippet that triggers the bug
      render: python
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: e.g. 3.12.3
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Windows 11, Ubuntu 22.04, macOS 14
    validations:
      required: true
  - type: textarea
    id: pip_list
    attributes:
      label: Package Versions
      description: Run `pip list | grep -iE "gudhi|numpy|scipy|tetrahedron"` and paste output
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any traceback or error messages
      render: text
