cluster_name: tetramem-xl
provider:
  type: aws
  region: ap-southeast-1
  availability_zone: ap-southeast-1a

max_workers: 32
idle_timeout_minutes: 15

head_node_type:
  instance_type: m6i.8xlarge
  use_spot: true

worker_node_types:
  - instance_type: m6i.4xlarge
    min_workers: 8
    max_workers: 32
    use_spot: true

setup_commands:
  - pip install -r requirements.txt
